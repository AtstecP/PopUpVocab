<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Word</title>
  <link rel="stylesheet" href="action.css">
</head>
<body>
  <div id="popup-container">
    <h2>Add New French Word</h2>

    <label for="word">French Word:</label>
    <input type="text" id="word" placeholder="e.g., était">

    <label for="definition">Definition:</label>
    <input type="text" id="definition" placeholder="e.g., was">

    <label for="pos">Part of Speech:</label>
    <input type="text" id="pos" placeholder="e.g., verb (imperfect)">

    <button id="add-word-btn">Save Word</button>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">

    <h2>Bulk Import (JSON)</h2>
    <label for="json-file" style="font-size: 12px; color: #555; margin-bottom: 5px; display: block;">
      Upload a JSON dictionary (e.g., {"word": {"definition": "...", "partOfSpeech": "..."}})
    </label>
    <input type="file" id="json-file" accept=".json" style="margin-bottom: 10px;">
    
    <button id="load-json-btn">Import JSON File</button>

    <p id="add-status" style="margin-top: 15px; font-weight: bold; text-align: center;"></p>
    
    <a href="action.html" style="display: block; text-align: center; color: #2d4633; font-size: 14px; margin-top: 15px; text-decoration: none;">&larr; Back to Settings</a>
  </div>

  <script src="add-word.js"></script>
</body>
</html>
